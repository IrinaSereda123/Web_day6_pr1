<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Праздничная открытка — готовый пример</title>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Marck+Script&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .back-link {
            margin-bottom: 20px;
        }
        
        .back-link a {
            color: white;
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }
        
        .back-link a:hover {
            background: rgba(0,0,0,0.5);
        }
        
        .card {
            width: 600px;
            height: 600px;
            position: relative;
            background-color: #ff4444;
            border: 3px solid gold;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        /* Скрываем только изображение и пожелания */
        .card img,
        .wish-label,
        .wish-container {
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        
        /* Обёртка для заголовка и ширмы */
        .title-wrapper {
            position: relative;
            width: 100%;
            /* Убираем возможные отступы, чтобы ширма закрывала всё */
        }
        
        .card h1 {
            font-family: 'Lobster', cursive;
            font-size: 48px;
            text-align: center;
            color: gold;
            text-shadow: 3px 3px 0 #cc8800;
            margin: 0;
            padding: 60px 0 0 0;
            position: relative;
            letter-spacing: 2px;
            z-index: 1;
            line-height: 1.2;
        }
        
        /* Ширма — теперь закрывает ВЕСЬ блок title-wrapper */
        .shutter {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ff4444;
            z-index: 20;
            transition: left 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        /* Блик — световое пятно на ширме */
        .gleam {
            position: absolute;
            top: 0;
            left: -20%;
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
            transform: skewX(-20deg);
            pointer-events: none;
        }
        
        .card img {
            display: block;
            margin: 30px auto;
            width: 150px;
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.5));
        }
        
        .wish-label {
            font-family: 'Marck Script', cursive;
            font-size: 36px;
            text-align: center;
            color: #fffae6;
            margin: 20px 0;
        }
        
        .wish-container {
            min-height: 80px;
            text-align: center;
            font-family: 'Lobster', cursive;
            font-size: 24px;
            color: #ffdd99;
            position: relative;
        }
        
        .wish-item {
            position: absolute;
            width: 100%;
            text-align: center;
            transition: opacity 0.5s ease;
            opacity: 0;
        }
        
        .wish-item.active {
            opacity: 1;
        }
        
        .info-note {
            margin-top: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="back-link">
        <a href="index.html">← Вернуться к инструкции</a>
    </div>
    
    <div class="card">
        <div class="title-wrapper">
            <h1>С днём рождения!</h1>
            <div class="shutter">
                <div class="gleam"></div>
            </div>
        </div>
        <img src="https://emojicdn.elk.sh/🌸" alt="Цветы" width="200">
        <div class="wish-label">Желаем</div>
        <div class="wish-container"></div>
    </div>
    
    <div class="info-note">
        ✨ Открытка оживает через 3 секунды после загрузки ✨
    </div>
    
    <script>
        const wishes = [
            "🌟 Счастья тебе!",
            "🎉 Улыбок и радости!",
            "⭐ Исполнения мечтаний!",
            "🍰 Вкусных тортов!",
            "🎁 Море подарков!",
            "💖 Любви и добра!"
        ];
        
        const img = document.querySelector('.card img');
        const shutter = document.querySelector('.shutter');
        const wishLabel = document.querySelector('.wish-label');
        const wishContainer = document.querySelector('.wish-container');
        
        let wishItems = [];
        let currentWishIndex = 0;
        
        function createWishElements() {
            wishes.forEach((wish, index) => {
                const div = document.createElement('div');
                div.className = 'wish-item';
                div.textContent = wish;
                if (index === 0) div.classList.add('active');
                wishContainer.appendChild(div);
                wishItems.push(div);
            });
        }
        
        function nextWish() {
            wishItems[currentWishIndex].classList.remove('active');
            currentWishIndex = (currentWishIndex + 1) % wishItems.length;
            wishItems[currentWishIndex].classList.add('active');
        }
        
        setTimeout(() => {
            // Ширма уезжает вправо — открывает заголовок
            shutter.style.left = '110%';
            
            setTimeout(() => {
                img.style.opacity = '1';
            }, 300);
            
            setTimeout(() => {
                wishLabel.style.opacity = '1';
            }, 1000);
            
            setTimeout(() => {
                createWishElements();
                wishContainer.style.opacity = '1';
                setInterval(nextWish, 2500);
            }, 1500);
            
        }, 3000);
    </script>
</body>
</html>
